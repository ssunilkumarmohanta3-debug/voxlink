kind = "mobile"
previewPath = "/"
title = "VoxLink - Voice & Video Connection"
version = "1.0.0"
id = "artifacts/voxlink"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20426

[services.development]
run = "pnpm --filter @workspace/voxlink run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/voxlink", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/voxlink", "run", "serve" ]

[services.env]
PORT = "20426"
BASE_PATH = "/"
